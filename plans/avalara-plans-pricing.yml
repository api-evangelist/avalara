      - name: Shared Company Service API
      - name: Automated Tariff Code Classification API
      - name: Self-Serve Tariff Classification API
      - name: 1099 & W-9 API
      - name: License Guidance Order API
  - id: avalara-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier for Avalara. Includes dedicated capacity, contractual SLAs, security
      review, data residency options, and named technical account management.
    entries:
      - label: API Requests
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: configurable
        domains: []
        unit: 1
        price: custom
