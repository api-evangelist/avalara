naftiko: 1.0.0-alpha2
info:
  label: Calculate Avalara tax on Stripe Checkout sessions
  description: Before creating a Stripe Checkout Session, call AvaTax createTransaction to compute the correct tax line and attach it to the session totals.
  tags:
  - Avalara
  - Integration
  - Payments
  - stripe
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: avalara
    baseUri: https://rest.avatax.com
    description: Avalara API operations consumed by this integration.
    resources:
    - name: api-v2-transactions-create
      path: /api/v2/transactions/create
      operations:
      - name: createtransaction
        method: POST
        description: AvaTax — create a tax transaction for the cart and return the tax-included totals.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-addresses-resolve
      path: /api/v2/addresses/resolve
      operations:
      - name: resolveaddress
        method: POST
        description: AvaTax — validate and resolve the shipping address before tax determination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: stripe
    baseUri: https://api.stripe.com
    description: Stripe API operations consumed by this integration.
    resources:
    - name: v1-checkout-sessions
      path: /v1/checkout/sessions
      operations:
      - name: createcheckoutsession
        method: POST
        description: 'Stripe API: createCheckoutSession'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-checkout-sessions-session
      path: /v1/checkout/sessions/{session}
      operations:
      - name: getcheckoutsession
        method: GET
        description: 'Stripe API: getCheckoutSession'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: session
          in: path
          type: string
          description: Path parameter session.
          required: true
  exposes:
  - type: mcp
    namespace: avalara-stripe-mcp
    description: MCP adapter for the avalara-stripe integration.
    tools:
    - name: avalara_stripe
      description: Execute the avalara stripe integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: avalara-stripe-rest
    port: 8080
    description: REST adapter for the avalara-stripe integration.
    resources:
    - path: /avalara-stripe
      name: avalara-stripe
      description: REST surface for the avalara-stripe integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the avalara-stripe integration.
        call: avalara_stripe
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
