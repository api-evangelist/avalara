- slug: avalara-stripe
  label: Calculate Avalara tax on Stripe Checkout sessions
  partner: stripe
  category: Payments
  use_case: Before creating a Stripe Checkout Session, call AvaTax createTransaction to compute the correct tax line and attach it to the session totals.
- slug: avalara-shopify
  label: Calculate Avalara sales tax for Shopify orders
  partner: shopify
  category: E-commerce
  use_case: For each Shopify order, call AvaTax createTransaction to determine sales tax, then commit on order fulfillment so Avalara Returns can file accurately.
- slug: avalara-bigcommerce
  label: Apply Avalara AvaTax to BigCommerce carts
  partner: bigcommerce
  category: E-commerce
  use_case: When a BigCommerce cart updates, call AvaTax to compute line-level tax and write the rates back so checkout shows the correct totals.
- slug: avalara-magento
  label: Replace Magento native tax with Avalara AvaTax
  partner: magento
  category: E-commerce
  use_case: Replace Magento's built-in tax engine with AvaTax for every quote-to-order so multi-jurisdiction U.S. sales tax is correct.
- slug: avalara-woocommerce
  label: Add Avalara tax determination to WooCommerce checkout
  partner: woocommerce
  category: E-commerce
  use_case: For each WooCommerce order, call AvaTax createTransaction to compute the correct sales tax and write it back to the order before payment capture.
- slug: avalara-salesforce-cpq
  label: Tax-aware quotes in Salesforce CPQ via Avalara
  partner: salesforce-cpq
  category: CPQ
  use_case: When a Salesforce CPQ Quote is generated, call AvaTax to determine the correct line-item tax and write it back to the SBQQ__Quote__c record so reps see a tax-accurate quote.
- slug: avalara-netsuite
  label: Sync AvaTax transactions into NetSuite invoices
  partner: netsuite
  category: ERP
  use_case: For each NetSuite invoice posted, mirror it as a committed AvaTax transaction so Returns has the underlying liability and NetSuite has the right tax lines.
- slug: avalara-microsoft-dynamics
  label: Drive Microsoft Dynamics 365 sales tax from Avalara
  partner: microsoft-dynamics
  category: ERP
  use_case: For Dynamics 365 sales orders, replace the native tax engine with AvaTax so U.S. multi-state and EU VAT determination is centralized.
- slug: avalara-sap-s4hana
  label: VAT determination for SAP S/4HANA via Avalara
  partner: sap-s4hana
  category: ERP
  use_case: Route SAP S/4HANA sales-document tax events through AvaTax for EU VAT and global indirect-tax determination, replacing per-country rate tables.
- slug: avalara-quickbooks
  label: Push Avalara tax lines into QuickBooks Online invoices
  partner: quickbooks
  category: Accounting
  use_case: For each AvaTax-committed transaction, write the matching tax line into a QuickBooks Online invoice so the GL stays in sync with what Returns will file.
- slug: avalara-sage-intacct
  label: Apply AvaTax to Sage Intacct AR transactions
  partner: sage-intacct
  category: Accounting
  use_case: For each Sage Intacct AR invoice, call AvaTax to determine sales tax and post the result back into the Intacct AR detail with a matched tax code.
- slug: avalara-certcapture-salesforce
  label: Surface Avalara CertCapture exemptions inside Salesforce Accounts
  partner: certcapture-salesforce
  category: Compliance
  use_case: When a Salesforce Account is opened, fetch the matching CertCapture customer and active certificates so reps see exempt status without leaving Salesforce, and any new certificate uploaded in Salesforce is pushed into CertCapture.
- slug: avalara-workday-financials
  label: Push AvaTax tax determination into Workday Financials
  partner: workday-financials
  category: ERP
  use_case: For Workday Financials customer invoices, call AvaTax to determine tax then post the tax detail back to the Workday Customer Invoice so finance reporting and Returns stay aligned.
