naftiko: 1.0.0-alpha2
info:
  label: Add Avalara tax determination to WooCommerce checkout
  description: For each WooCommerce order, call AvaTax createTransaction to compute the correct sales tax and write it back to the order before payment capture.
  tags:
  - Avalara
  - Integration
  - E-commerce
  - woocommerce
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
    WOOCOMMERCE_API_KEY: WOOCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: avalara
    baseUri: https://rest.avatax.com
    description: Avalara API operations consumed by this integration.
    resources:
    - name: api-v2-transactions-create
      path: /api/v2/transactions/create
      operations:
      - name: createtransaction
        method: POST
        description: AvaTax — calculate tax for the WooCommerce order.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-companies-companycode-transactions-transactioncode-vo
      path: /api/v2/companies/{companyCode}/transactions/{transactionCode}/void
      operations:
      - name: voidtransaction
        method: POST
        description: AvaTax — void the tax transaction if the order is canceled.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: companyCode
          in: path
          type: string
          description: Path parameter companyCode.
          required: true
        - name: transactionCode
          in: path
          type: string
          description: Path parameter transactionCode.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: woocommerce
    baseUri: https://yourstore.com
    description: WooCommerce REST API operations consumed by this integration.
    resources:
    - name: wp-json-wc-v3-orders-id
      path: /wp-json/wc/v3/orders/{id}
      operations:
      - name: getorder
        method: GET
        description: 'WooCommerce REST API: getOrder'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
    - name: wp-json-wc-v3-orders-id
      path: /wp-json/wc/v3/orders/{id}
      operations:
      - name: updateorder
        method: PUT
        description: 'WooCommerce REST API: updateOrder'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: avalara-woocommerce-mcp
    description: MCP adapter for the avalara-woocommerce integration.
    tools:
    - name: avalara_woocommerce
      description: Execute the avalara woocommerce integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: avalara-woocommerce-rest
    port: 8080
    description: REST adapter for the avalara-woocommerce integration.
    resources:
    - path: /avalara-woocommerce
      name: avalara-woocommerce
      description: REST surface for the avalara-woocommerce integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the avalara-woocommerce integration.
        call: avalara_woocommerce
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
