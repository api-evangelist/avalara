specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Avalara
providerId: avalara
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Avalara pricing is quote-based and not publicly posted. This artifact models the FinOps shape
  of an AvaTax-led tax-compliance subscription with per-transaction and per-filing meters.
tags:
  - FinOps
  - FOCUS
  - Tax Compliance
  - Sales Tax
  - VAT
  - E-Invoicing
description: 'FOCUS-aligned FinOps for Avalara: subscription + per-transaction tax-compliance billing
  with separate meters for AvaTax calculations, Returns filings, certificate management, and
  e-invoicing documents.'
sources:
  - https://www.avalara.com/us/en/products.html
  - https://www.avalara.com/us/en/products/calculations/avatax.html
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Avalara, Inc.
serviceCategory: Tax Compliance
billingModel:
  pricingCategory: Subscription + Pay-As-You-Go
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Tax
    - Credit
focusColumns:
  ServiceName: Avalara
  ServiceCategory: Tax Compliance
  ProviderName: Avalara
  PublisherName: Avalara, Inc.
  InvoiceIssuerName: Avalara, Inc.
  BillingCurrency: USD
meters:
  - name: avatax_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - jurisdiction
      - country
      - document_type
  - name: jurisdictions_subscribed
    unit: jurisdiction
    aggregation: max
    dimensions:
      - country
  - name: returns_filings
    unit: filing
    aggregation: sum
    dimensions:
      - jurisdiction
      - return_type
  - name: certificate_storage
    unit: certificate
    aggregation: max
  - name: e_invoice_documents
    unit: document
    aggregation: sum
    dimensions:
      - country
      - mandate_type
  - name: cross_border_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - origin_country
      - destination_country
principles:
  - name: Visibility
    description: Use the AvaTax admin console and the Reporting API to track transaction counts by
      company / jurisdiction / document type; reconcile against the annual subscription envelope.
  - name: Allocation
    description: Tag CreateTransaction calls with internal company / location / business-unit codes;
      use those to allocate Avalara spend to the originating ERP entity.
  - name: Optimization
    description: Right-size the jurisdiction footprint annually (drop states with no nexus); batch
      adjustments and avoid voiding-and-reissuing transactions which can double-count meters; consolidate
      multi-product discounts at renewal.
  - name: Accountability
    description: Tax / Indirect-Tax team owns the Avalara subscription; engineering owns the integration
      health; finance reviews jurisdiction footprint annually.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
