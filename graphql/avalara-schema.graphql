  amount: Float!
  taxCode: String
  itemCode: String
  description: String
  discountAmount: Float
  taxIncluded: Boolean
  customerUsageType: String
  entityUseCode: String
  exemptionCode: String
  hsCode: String
  ref1: String
  ref2: String
  parameters: JSON
}

input CreateTransactionInput {
  type: DocumentType!
  companyCode: String!
  date: DateTime!
  customerCode: String!
  code: String
  currencyCode: String
  addresses: TransactionAddressesInput
  lines: [TransactionLineInput!]!
  commit: Boolean
  referenceCode: String
  purchaseOrderNo: String
  entityUseCode: String
  exemptionNo: String
  businessIdentificationNo: String
  description: String
  parameters: JSON
}

input AdjustTransactionInput {
  adjustmentReason: AdjustmentReason!
  adjustmentDescription: String
  newTransaction: CreateTransactionInput!
}

input CreateCompanyInput {
  name: String!
  companyCode: String!
  taxpayerIdNumber: String
  isFein: Boolean
  isDefault: Boolean
  defaultCountry: String
  baseCurrencyCode: String
  isTest: Boolean
}

input CreateNexusInput {
  country: String!
  region: String
  jurisTypeId: String
  jurisCode: String
  jurisName: String
  nexusTypeId: NexusType
  effectiveDate: DateTime
  endDate: DateTime
  hasLocalNexus: Boolean
  isSellerImporterOfRecord: Boolean
}

input CreateCertificateInput {
  signedDate: DateTime!
  expirationDate: DateTime
  exemptionNumber: String
  isSingleCertificate: Boolean
  exemptionReasonId: Int
  valid: Boolean
  customers: [String!]
  exposureZones: [Int!]
}

input CreateCustomerInput {
  customerCode: String!
  alternateId: String
  name: String!
  attnName: String
  line1: String
  line2: String
  city: String
  postalCode: String
  phoneNumber: String
  emailAddress: String
  isBill: Boolean
  isShip: Boolean
}

input CreateBatchInput {
  name: String!
  batchTypeId: String!
  options: String
  files: [BatchFileInput!]!
}

input BatchFileInput {
  name: String!
  contentType: String
  content: String!
  fileExtras: String
}

input ReportFilterInput {
  documentType: DocumentType
  dateFilter: String
  startDate: DateTime
  endDate: DateTime
  country: String
  region: String
}

input ListFilter {
  filter: String
  top: Int
  skip: Int
  orderBy: String
}

# ─────────────────────────────────────────────
# Query
# ─────────────────────────────────────────────

type Query {
  # Account
  account(id: Int!): Account
  accounts(filter: ListFilter): [Account!]!

  # Company
  company(id: Int!): Company
  companies(accountId: Int, filter: ListFilter): CompanyConnection!
  companyLocations(companyId: Int!, filter: ListFilter): [CompanyLocation!]!

  # Contact
  contact(companyId: Int!, id: Int!): Contact
  contacts(companyId: Int!, filter: ListFilter): [Contact!]!

  # Transaction
  transaction(companyCode: String!, transactionCode: String!): Transaction
  transactions(companyId: Int!, filter: ListFilter): TransactionConnection!

  # Tax Calculation
  taxRateByAddress(line1: String!, city: String!, region: String!, postalCode: String!, country: String!): TaxRateResult
  taxRateByPostalCode(country: String!, postalCode: String!): TaxRateResult

  # Address Validation
  resolveAddress(line1: String, city: String, region: String, postalCode: String, country: String): AddressResolutionResult

  # TaxCode
  taxCode(companyId: Int!, id: Int!): TaxCode
  taxCodes(companyId: Int!, filter: ListFilter): [TaxCode!]!
  systemTaxCodes(filter: ListFilter): [TaxCode!]!
  taxCategories(filter: ListFilter): [TaxCategory!]!

  # TaxRule
  taxRule(companyId: Int!, id: Int!): TaxRule
  taxRules(companyId: Int!, filter: ListFilter): [TaxRule!]!

  # Nexus
  nexusDeclaration(companyId: Int!, id: Int!): NexusDeclaration
  nexusDeclarations(companyId: Int!, filter: ListFilter): [NexusDeclaration!]!

  # Certificate
  certificate(companyId: Int!, id: Int!): Certificate
  certificates(companyId: Int!, filter: ListFilter): CertificateConnection!

  # Exemption
  exemption(companyId: Int!, id: Int!): Exemption
  exemptions(companyId: Int!, filter: ListFilter): [Exemption!]!
  exemptionReasons: [ExemptionReason!]!

  # CertExpress
  certExpressRequest(companyId: Int!, customerCode: String!, id: Int!): CertExpressRequest
  certExpressRequests(companyId: Int!, customerCode: String!): [CertExpressRequest!]!

  # Customer
  customer(companyId: Int!, customerCode: String!): Customer
  customers(companyId: Int!, filter: ListFilter): [Customer!]!

  # Batch
  batch(companyId: Int!, id: Int!): Batch
  batches(companyId: Int!, filter: ListFilter): [Batch!]!

  # Report
  report(companyId: Int!, id: String!): Report
  reports(companyId: Int!, filter: ListFilter): [Report!]!

  # Filing
  filingCalendar(companyId: Int!, id: Int!): FilingCalendar
  filingCalendars(companyId: Int!, filter: ListFilter): [FilingCalendar!]!
  filingPeriods(companyId: Int!, filingFrequency: FilingFrequency, month: Int, year: Int): [FilingPeriod!]!
  returnCalendars(companyId: Int!, filter: ListFilter): [ReturnCalendar!]!

  # UPC
  upc(companyId: Int!, id: Int!): UPC
  upcs(companyId: Int!, filter: ListFilter): [UPC!]!

  # JurisdictionOverride
  jurisdictionOverride(accountId: Int!, id: Int!): JurisdictionOverride
  jurisdictionOverrides(accountId: Int!, filter: ListFilter): [JurisdictionOverride!]!

  # DataSource
  dataSource(companyId: Int!, id: Int!): DataSource
  dataSources(companyId: Int!, filter: ListFilter): [DataSource!]!

  # Reference Data
  countries(filter: ListFilter): [CountryInfo!]!
  country(code: String!): CountryInfo
  regions(country: String, filter: ListFilter): [RegionInfo!]!
  postcode(country: String!, postalCode: String!): Postcode
  freightTaxCodes(filter: ListFilter): [Freight!]!

  # User
  user(accountId: Int!, id: Int!): User
  users(accountId: Int!, filter: ListFilter): [User!]!

  # AvaHub
  avaHubConfig(companyId: Int!): AvaHubConfig
}

# ─────────────────────────────────────────────
# Mutation
# ─────────────────────────────────────────────

type Mutation {
  # Transaction
  createTransaction(input: CreateTransactionInput!): Transaction!
  adjustTransaction(companyCode: String!, transactionCode: String!, input: AdjustTransactionInput!): Transaction!
  commitTransaction(companyCode: String!, transactionCode: String!): Transaction!
  voidTransaction(companyCode: String!, transactionCode: String!, code: VoidReason!): Transaction!
  refundTransaction(companyCode: String!, transactionCode: String!, refundDate: DateTime!, refundType: String!, refundPercentage: Float): Transaction!
  lockTransaction(companyCode: String!, transactionCode: String!): Transaction!
  createBulkTransactions(companyCode: String!, inputs: [CreateTransactionInput!]!): BulkTransaction!

  # Company
  createCompany(accountId: Int!, input: CreateCompanyInput!): Company!
  updateCompany(id: Int!, input: CreateCompanyInput!): Company!
  deleteCompany(id: Int!): Boolean!

  # Nexus
  createNexus(companyId: Int!, input: CreateNexusInput!): NexusDeclaration!
  updateNexus(companyId: Int!, id: Int!, input: CreateNexusInput!): NexusDeclaration!
  deleteNexus(companyId: Int!, id: Int!): Boolean!

  # TaxCode
  createTaxCode(companyId: Int!, taxCode: String!, taxCodeTypeId: String!, description: String): TaxCode!
  updateTaxCode(companyId: Int!, id: Int!, taxCode: String!, taxCodeTypeId: String!, description: String): TaxCode!
  deleteTaxCode(companyId: Int!, id: Int!): Boolean!

  # TaxRule
  createTaxRule(companyId: Int!, input: JSON!): TaxRule!
  updateTaxRule(companyId: Int!, id: Int!, input: JSON!): TaxRule!
  deleteTaxRule(companyId: Int!, id: Int!): Boolean!

  # Certificate
  createCertificate(companyId: Int!, input: CreateCertificateInput!): Certificate!
  updateCertificate(companyId: Int!, id: Int!, input: CreateCertificateInput!): Certificate!
  deleteCertificate(companyId: Int!, id: Int!): Boolean!
  linkCertificateToCustomer(companyId: Int!, certificateId: Int!, customerCode: String!): Certificate!
  unlinkCertificateFromCustomer(companyId: Int!, certificateId: Int!, customerCode: String!): Boolean!

  # CertExpress
  createCertExpressRequest(companyId: Int!, customerCode: String!, deliveryType: String!, coverLetter: String): CertExpressRequest!

  # Customer
  createCustomer(companyId: Int!, input: CreateCustomerInput!): Customer!
  updateCustomer(companyId: Int!, customerCode: String!, input: CreateCustomerInput!): Customer!
  deleteCustomer(companyId: Int!, customerCode: String!): Boolean!

  # Exemption
  createExemption(companyId: Int!, input: JSON!): Exemption!
  updateExemption(companyId: Int!, id: Int!, input: JSON!): Exemption!
  deleteExemption(companyId: Int!, id: Int!): Boolean!

  # Batch
  createBatch(companyId: Int!, input: CreateBatchInput!): Batch!
  cancelBatch(companyId: Int!, id: Int!): Batch!

  # Report
  initiateReport(companyId: Int!, reportType: ReportType!, filter: ReportFilterInput!): Report!

  # JurisdictionOverride
  createJurisdictionOverride(accountId: Int!, input: JSON!): JurisdictionOverride!
  updateJurisdictionOverride(accountId: Int!, id: Int!, input: JSON!): JurisdictionOverride!
  deleteJurisdictionOverride(accountId: Int!, id: Int!): Boolean!

  # UPC
  createUPC(companyId: Int!, upc: String!, taxCode: String, description: String): UPC!
  updateUPC(companyId: Int!, id: Int!, upc: String!, taxCode: String, description: String): UPC!
  deleteUPC(companyId: Int!, id: Int!): Boolean!

  # DataSource
  createDataSource(companyId: Int!, source: String!, instance: String, isEnabled: Boolean): DataSource!
  updateDataSource(companyId: Int!, id: Int!, isEnabled: Boolean): DataSource!
  deleteDataSource(companyId: Int!, id: Int!): Boolean!

  # Account Provisioning
  provisionAccount(accountId: Int!, subscriptionCode: String!): Provisioned!

  # AvaHub
  updateAvaHubConfig(companyId: Int!, isEnabled: Boolean!, serviceUrl: String): AvaHubConfig!
}
