# Avalara Conceptual GraphQL Schema
# Source: AvaTax REST API v2 and related Avalara APIs
# Reference: https://developer.avalara.com/api-reference/avatax/rest/v2/
# Note: Avalara does not natively offer GraphQL. This is a conceptual schema
# for teams building GraphQL gateways over the Avalara platform.

scalar DateTime
scalar JSON

# ─────────────────────────────────────────────
# Enumerations
# ─────────────────────────────────────────────

enum DocumentType {
  SALES_ORDER
  SALES_INVOICE
  PURCHASE_ORDER
  PURCHASE_INVOICE
  RETURN_ORDER
  RETURN_INVOICE
  INVENTORY_TRANSFER_ORDER
  INVENTORY_TRANSFER_INVOICE
  REVERSAL_CHARGE
  REVERSAL_CHARGE_INVOICE
}

enum DocumentStatus {
  TEMPORARY
  SAVED
  POSTED
  COMMITTED
  CANCELLED
  ADJUSTED
  QUEUED
  PENDING_APPROVAL
}

enum AdjustmentReason {
  NOT_ADJUSTED
  SOURCING_ISSUE
  RECONCILED_WITH_GENERAL_LEDGER
  EXEMPTION_CERTIFICATE_APPLIED
  PRICE_ADJUSTED
  PRODUCT_RETURNED
  PRODUCT_EXCHANGED
  BAD_DEBT
  OTHER
  OFFLINE
}

enum BatchStatus {
  WAITING
  SYSTEM_ERRORS
  IN_PROGRESS
  COMPLETED
  ERRORS
  PARTIAL_ERRORS
  CANCELLED
  PAUSED
}

enum FilingFrequency {
  MONTHLY
  QUARTERLY
  SEMI_ANNUALLY
  ANNUALLY
  BIMONTHLY
  OCCASIONAL
  INVOICE_PAYMENT
  WEEKLY
}

enum NexusType {
  NONE
  SELLERS_USE_TAX
  SALES_TAX
  MARKETPLACE_AND_SELLER_USE_TAX
  MARKETPLACE_AND_SALES_TAX
  TITLE_TRANSFER
  COMMUNITY_STATE_POLICY
}

enum CertificateStatus {
  ACTIVE
  EXPIRED
  REVOKED
  PENDING
}

enum ReportType {
  AVATAX_TRANSACTIONS
  SUMMARY
  DETAIL
}

enum ServiceMode {
  AUTOMATIC
  LOCAL
  REMOTE
}

enum TaxType {
  SALES
  SELLERS_USE
  USE
  VAT
  GST
  EXCISE
  COMMUNICATIONS
}

enum VoidReason {
  UNSPECIFIED
  POST_FAILED
  DOCUMENT_DELETED
  DOCUMENT_VOIDED
  ADJUSTMENT_CANCELLED
}

