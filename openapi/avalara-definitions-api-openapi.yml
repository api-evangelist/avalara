components:
  parameters:
    top:
      name: $top
      in: query
      schema:
        type: integer
        default: 1000
      description: Maximum number of results to return
    filter:
      name: $filter
      in: query
      schema:
        type: string
      description: OData filter expression for result filtering
    skip:
      name: $skip
      in: query
      schema:
        type: integer
        default: 0
      description: Number of results to skip for pagination
  schemas:
    FetchResult_TaxCodeModel:
      type: object
      properties:
        '@recordsetCount':
          type: integer
        value:
          type: array
          items:
            $ref: '#/components/schemas/TaxCodeModel'
    TaxCodeModel:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        taxCode:
          type: string
        taxCodeTypeId:
          type: string
        description:
          type: string
        isPhysical:
          type: boolean
        isActive:
          type: boolean
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.0 bearer token
