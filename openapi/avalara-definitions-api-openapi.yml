  /api/v2/definitions/parameters/byitem/{companyCode}/{itemCode}:
    get:
      tags:
      - Definitions
      summary: Avalara ListParametersByItem
      description: "Returns the list of parameters based on the company's service types and the item code.\r\nIgnores nexus if a service type is configured in the 'IgnoreNexusForServiceTypes' configuration section.\r\nIgnores nexus for the AvaAlcohol service type.\r\n            \r\nNOTE: If your company code or item code contains any of these characters /, +, ? or a space, please use the following encoding before making a request:\r\n* Replace '/' with '\\_-ava2f-\\_'  For example: 'Company/Code' becomes 'Company_-ava2f-_Code'\r\n* Replace '+' with '\\_-ava2b-\\_'  For example: 'Company+Code' becomes 'Company_-ava2b-_Code'\r\n* Replace '?' with '\\_-ava3f-\\_'  For example: 'Company?Code' becomes 'Company_-ava3f-_Code'\r\n* Replace '%' with '\\_-ava25-\\_'  For example: 'Company%Code' becomes 'Company_-ava25-_Code'\r\n* Replace '#' with '\\_-ava23-\\_'  For example: 'Company#Code' becomes 'Company_-ava23-_Code'\r\n            \r\nFor Item Code other than the five given above below two should also be used\r\n* Replace ''' with '\\_-ava27-\\_'  For example: 'Item'Code' becomes 'Item_-ava27-_Code'\r\n* Replace '\"' with '\\_-ava22-\\_'  For example: 'Item\"Code' becomes 'Item_-ava22-_Code'\n\n### Security Policies\n\n* This API requires one of the following user roles: AccountAdmin, AccountUser, BatchServiceAdmin, CompanyAdmin, CompanyUser, CSPAdmin, CSPTester, SiteAdmin, SSTAdmin, SystemAdmin, TechnicalSupportAdmin, TechnicalSupportUser.\n"
      parameters:
      - name: X-Avalara-Client
        in: header
        schema:
          type: string
        description: Identifies the software you are using to call this API. For more information on the client header, see [Client Headers](https://developer.avalara.com/avatax/client-headers/).
        example: AvaTax Postman Collection
      - name: companyCode
        in: path
        schema:
          type: string
        required: true
      - name: itemCode
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
