      - Transactions
      summary: Avalara VerifyTransaction
      description: "Verifies that the transaction uniquely identified by this URL matches certain expected values.\r\n            \r\nIf the transaction does not match these expected values, this API will return an error code indicating which value did not match.\r\n            \r\nIf you have more than one document with the same `code`, specify the `documentType` parameter to choose between them.\r\n            \r\nA transaction represents a unique potentially taxable action that your company has recorded, and transactions include actions like\r\nsales, purchases, inventory transfer, and returns (also called refunds).\r\n            \r\nYou may specify one or more of the following values in the `$include` parameter to fetch additional nested data, using commas to separate multiple values:\r\n            \r\n* Lines\r\n* Details (implies lines)\r\n* AccountPayableSalesTaxDetails (implies lines - only for Account Payable transaction)\r\n* Summary (implies details)\r\n* Addresses\r\n* SummaryOnly (omit lines and details - reduces API response size)\r\n* LinesOnly (omit details - reduces API response size)\r\n* TaxDetailsByTaxType - Includes the aggregated tax, exempt tax, taxable and non-taxable for each tax type returned in the transaction summary.\r\n            \r\nNOTE: If your companyCode or transactionCode contains any of these characters /, +, ? or a space please use the following encoding before making a request:\r\n* Replace '/' with '\\_-ava2f-\\_'  For example: document/Code becomes document_-ava2f-_Code\r\n* Replace '+' with '\\_-ava2b-\\_'  For example: document+Code becomes document_-ava2b-_Code\r\n* Replace '?' with '\\_-ava3f-\\_'  For example: document?Code becomes document_-ava3f-_Code\r\n* Replace '%' with '\\_-ava25-\\_'  For example: document%Code becomes document_-ava25-_Code\r\n* Replace '#' with '\\_-ava23-\\_'  For example: document#Code becomes document_-ava23-_Code\r\n* Replace ' ' with '%20'  For example: document Code becomes document%20Code\n\n### Security Policies\n\n* This API requires one of the following user roles: AccountAdmin, AccountOperator, AccountUser, BatchServiceAdmin, CompanyAdmin, CompanyUser, CSPTester, ProStoresOperator, SSTAdmin, TechnicalSupportAdmin.\n* This API depends on the following active services:*Required* (all):  AvaTaxPro, BasicReturns.\n"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                verifyTransactionDate: '2023-08-13T00:00:00+00:00'
                verifyTotalAmount: 100
                verifyTotalTax: 6.25
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      - name: X-Avalara-Client
        in: header
        schema:
          type: string
        description: Identifies the software you are using to call this API. For more information on the client header, see [Client Headers](https://developer.avalara.com/avatax/client-headers/).
        example: AvaTax Postman Collection
      - name: companyCode
        in: path
        schema:
          type: string
        required: true
      - name: transactionCode
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
components:
  schemas:
    TransactionLineModel:
      type: object
      properties:
        id:
          type: integer
          format: int64
        lineNumber:
          type: string
        lineAmount:
          type: number
          format: double
        tax:
          type: number
          format: double
        taxableAmount:
          type: number
          format: double
        exemptAmount:
          type: number
          format: double
        taxCode:
          type: string
        itemCode:
          type: string
    TransactionAddressModel:
      type: object
      properties:
        id:
          type: integer
          format: int64
        line1:
          type: string
        city:
          type: string
        region:
          type: string
        postalCode:
          type: string
        country:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
    VATTransaction:
      type: object
      properties:
        transactionId:
          type: string
        transactionDate:
          type: string
          format: date
        transactionType:
          type: string
          enum:
          - Sale
          - Purchase
          - IntraCommunitySupply
          - IntraCommunityAcquisition
          - Export
          - Import
        invoiceNumber:
          type: string
        supplierVATNumber:
          type: string
        customerVATNumber:
          type: string
        countryCode:
          type: string
        netAmount:
          type: number
          format: double
        vatRate:
          type: number
          format: double
        vatAmount:
          type: number
          format: double
        currency:
          type: string
    VoidTransactionModel:
      type: object
      required:
      - code
      properties:
        code:
          type: string
          enum:
          - Unspecified
          - PostFailed
          - DocDeleted
          - DocVoided
          - AdjustmentCancelled
          description: Reason for voiding the transaction
    TransactionSummary:
      type: object
      properties:
        country:
          type: string
        region:
          type: string
        jurisType:
          type: string
        jurisCode:
          type: string
        jurisName:
          type: string
        taxType:
          type: string
        rate:
          type: number
          format: double
        tax:
          type: number
          format: double
        taxable:
          type: number
          format: double
        exempt:
          type: number
          format: double
    RefundTransactionModel:
      type: object
      required:
      - refundTransactionCode
      - refundDate
      - refundType
      properties:
        refundTransactionCode:
          type: string
        refundDate:
          type: string
          format: date
        refundType:
          type: string
          enum:
          - Full
          - Partial
          - Percentage
          - TaxOnly
        refundPercentage:
          type: number
          format: double
        refundLines:
          type: array
          items:
            type: string
    AddressInfo:
      type: object
      properties:
        line1:
          type: string
          description: Street address line 1
        line2:
          type: string
          description: Street address line 2
        line3:
          type: string
          description: Street address line 3
        city:
          type: string
          description: City name
        region:
          type: string
          description: State, province, or region code
        postalCode:
          type: string
          description: Postal code or ZIP code
        country:
          type: string
          description: Two-character ISO 3166 country code
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
    TransactionModel:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Unique ID of the transaction
        code:
          type: string
          description: Transaction code
        companyId:
          type: integer
          description: Company ID that owns this transaction
        date:
          type: string
          format: date
          description: Date of the transaction
        status:
          type: string
          enum:
          - Temporary
          - Saved
          - Posted
          - Committed
          - Cancelled
          - Adjusted
          description: Current status of the transaction
        type:
          type: string
          description: Document type
        totalAmount:
          type: number
          format: double
          description: Total amount of the transaction before tax
        totalTax:
          type: number
          format: double
          description: Total tax calculated for the transaction
        totalTaxable:
          type: number
          format: double
          description: Total taxable amount
        totalExempt:
          type: number
          format: double
          description: Total exempt amount
        lines:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLineModel'
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/TransactionAddressModel'
        summary:
          type: array
          items:
            $ref: '#/components/schemas/TransactionSummary'
    LineItemModel:
      type: object
      required:
      - amount
      properties:
        number:
          type: string
          description: Line number within the transaction
        quantity:
          type: number
          format: double
          default: 1
          description: Quantity of items
        amount:
          type: number
          format: double
          description: Total amount for this line
        taxCode:
          type: string
          description: Tax code for this line item
        itemCode:
          type: string
          description: Item code for the product or service
        description:
          type: string
          description: Description of the line item
        addresses:
          type: object
          properties:
            shipFrom:
              $ref: '#/components/schemas/AddressInfo'
            shipTo:
              $ref: '#/components/schemas/AddressInfo'
        exemptionCode:
          type: string
          description: Exemption code for tax-exempt purchases
    CommitTransactionModel:
      type: object
      required:
      - commit
      properties:
        commit:
          type: boolean
          description: Set to true to commit the transaction
    ExciseTransaction:
      type: object
      properties:
        transactionId:
          type: string
        invoiceNumber:
          type: string
        transactionDate:
          type: string
          format: date
        transactionType:
          type: string
        status:
          type: string
          enum:
          - Pending
          - Committed
          - Voided
        totalAmount:
          type: number
          format: double
        totalTax:
          type: number
          format: double
    AdjustTransactionModel:
      type: object
      required:
      - adjustmentReason
      - newTransaction
      properties:
        adjustmentReason:
          type: string
          enum:
          - NotAdjusted
          - SourcingIssue
          - ReconciledWithGeneralLedger
          - ExemptCertApplied
          - PriceAdjusted
          - ProductReturned
          - ProductExchanged
          - BadDebt
          - Other
        adjustmentDescription:
          type: string
        newTransaction:
          $ref: '#/components/schemas/CreateTransactionModel'
    CreateTransactionModel:
      type: object
      required:
      - type
      - companyCode
      - date
      - customerCode
      - lines
      properties:
        type:
          type: string
          enum:
          - SalesOrder
          - SalesInvoice
          - PurchaseOrder
          - PurchaseInvoice
          - ReturnOrder
          - ReturnInvoice
          description: The type of document to create
        companyCode:
          type: string
          description: Company code of the company creating this transaction
        date:
          type: string
          format: date
          description: Date of the transaction
        customerCode:
          type: string
          description: Unique code identifying the customer
        commit:
          type: boolean
          default: false
          description: Whether to commit the transaction immediately
        currencyCode:
          type: string
          description: Three-character ISO 4217 currency code
        addresses:
          type: object
          properties:
            shipFrom:
              $ref: '#/components/schemas/AddressInfo'
            shipTo:
              $ref: '#/components/schemas/AddressInfo'
            pointOfOrderOrigin:
              $ref: '#/components/schemas/AddressInfo'
            pointOfOrderAcceptance:
              $ref: '#/components/schemas/AddressInfo'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/LineItemModel'
          description: Line items for the transaction
    TransactionBatch:
      type: object
      properties:
        companyId:
          type: string
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/VATTransaction'
    ErrorResult:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
            target:
              type: string
              description: The component that generated the error
            details:
              type: array
              items:
                type: object
                properties:
                  code:
                    type: string
                  number:
                    type: integer
                  message:
                    type: string
                  description:
                    type: string
                  faultCode:
                    type: string
                  helpLink:
                    type: string
                  severity:
                    type: string
                    enum:
                    - Error
                    - Warning
                    - Exception
  responses:
    Unauthorized:
      description: Authentication credentials missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResult'
    NotFound:
      description: Requested resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResult'
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResult'
  parameters:
    companyCode:
      name: companyCode
      in: path
      required: true
      schema:
        type: string
      description: The company code identifying the company
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.0 bearer token
externalDocs:
  description: 1099 & W-9 API Documentation
  url: https://developer.avalara.com/api-reference/avalara1099/avalara1099/
