components:
  schemas:
    CompanyModel:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the company
        companyCode:
          type: string
          description: Short code identifying this company
        name:
          type: string
          description: Display name of the company
        isDefault:
          type: boolean
          description: Whether this is the default company for the account
        isActive:
          type: boolean
        taxpayerIdNumber:
          type: string
          description: Tax identification number (EIN, TIN)
        hasProfile:
          type: boolean
        isReportingEntity:
          type: boolean
        defaultCountry:
          type: string
          description: Default country for this company
        baseCurrencyCode:
          type: string
          description: Default currency code
        sstEffDate:
          type: string
          format: date
        roundingLevelId:
          type: string
          enum:
          - Line
          - Document
        sstPId:
          type: string
        createdDate:
          type: string
          format: date-time
        modifiedDate:
          type: string
          format: date-time
    CompanyInitializationModel:
      type: object
      required:
      - name
      - companyCode
      - taxpayerIdNumber
      - line1
      - city
      - region
      - postalCode
      - country
      properties:
        name:
          type: string
        companyCode:
          type: string
        taxpayerIdNumber:
          type: string
        line1:
          type: string
        line2:
          type: string
        line3:
          type: string
        city:
          type: string
        region:
          type: string
        postalCode:
          type: string
        country:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        title:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        mobileNumber:
          type: string
    FetchResult_CompanyModel:
      type: object
      properties:
        '@recordsetCount':
          type: integer
        value:
          type: array
          items:
            $ref: '#/components/schemas/CompanyModel'
    PayerCompany:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        ein:
          type: string
          description: Employer Identification Number
        address:
          type: object
          properties:
            line1:
              type: string
            city:
              type: string
            state:
              type: string
            postalCode:
              type: string
        contactName:
          type: string
        contactPhone:
          type: string
        contactEmail:
          type: string
          format: email
    SharedCompany:
      type: object
      properties:
        companyId:
          type: string
        companyName:
          type: string
        companyCode:
          type: string
        taxPayerId:
          type: string
          description: Tax identification number
        address:
          type: object
          properties:
            line1:
              type: string
            line2:
              type: string
            city:
              type: string
            region:
              type: string
            postalCode:
              type: string
            country:
              type: string
        phoneNumber:
          type: string
        email:
          type: string
          format: email
        isActive:
          type: boolean
        createdDate:
          type: string
          format: date-time
        modifiedDate:
          type: string
          format: date-time
  parameters:
    top:
      name: $top
      in: query
      schema:
        type: integer
        default: 1000
      description: Maximum number of results to return
    filter:
      name: $filter
      in: query
      schema:
        type: string
      description: OData filter expression for result filtering
    skip:
      name: $skip
      in: query
      schema:
        type: integer
        default: 0
      description: Number of results to skip for pagination
    orderBy:
      name: $orderBy
      in: query
      schema:
        type: string
      description: Field name for sorting results
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.0 bearer token
externalDocs:
  description: 1099 & W-9 API Documentation
  url: https://developer.avalara.com/api-reference/avalara1099/avalara1099/
