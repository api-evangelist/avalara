        example: AvaTax Postman Collection
      - name: companyId
        in: path
        schema:
          type: string
        required: true
      - name: tag
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/companies/{companyId}/itemcatalogue:
    post:
      tags:
      - Items
      summary: Avalara SyncItemCatalogue
      description: "Creates/updates one or more item objects with additional properties and the AvaTax category attached to this company.\r\n            \r\nItems are a way of separating your tax calculation process from your tax configuration details. Use this endpoint to create\r\na new or update an existing item. This can be used to sync the items with Avalara. For example, an accounting software\r\nsystem can use this to sync all their items from an ERP with Avalara.\r\n            \r\nParameters and Classifications can be added with the Item.\n\n### Security Policies\n\n* This API requires one of the following user roles: AccountAdmin, BatchServiceAdmin, CompanyAdmin, CSPTester, SSTAdmin, TechnicalSupportAdmin.\n"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                itemId: 0
                itemCode: Item 1
                description: Concord Grape Alpha
                summary: Apple Cider Vinegar Drink
                taxCode: P0000000
                upc: '7846226233'
                itemGroup: Drinks
                category: beverages - vinegar - drink
                source: QBO
                sourceEntityId: QBO_1234
                properties:
                  color: white
                classifications:
                - productCode: '9011900000'
                  systemCode: TARIC
                  isPremium: false
                parameters:
                - id: 0
                  name: ScreenSize
                  value: '24'
                  unit: Inch
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      - name: X-Avalara-Client
        in: header
        schema:
          type: string
        description: Identifies the software you are using to call this API. For more information on the client header, see [Client Headers](https://developer.avalara.com/avatax/client-headers/).
        example: AvaTax Postman Collection
      - name: companyId
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/companies/{companyId}/items/sync:
    post:
      tags:
      - Items
      summary: Avalara SyncItems
      description: "Syncs a list of items with AvaTax without waiting for them to be created. It is ideal for syncing large product catalogs\r\nwith AvaTax.\r\n            \r\nAny invalid or duplicate items will be ignored. To diagnose why an item is not created, use the normal create transaction API to receive validation information.\r\n            \r\nThis API is currently limited to 1000 items per call (the limit is subject to change).\r\n            \r\nItems are a way of separating your tax calculation process from your tax configuration details.  If you choose, you\r\ncan provide `itemCode` values for each `CreateTransaction()` API call rather than specifying tax codes, parameters, descriptions,\r\nand other data fields.  AvaTax will automatically look up each `itemCode` and apply the correct tax codes and parameters\r\nfrom the item table instead.  This allows your CreateTransaction call to be as simple as possible, and your tax compliance\r\nteam can manage your item catalog and adjust the tax behavior of items without having to modify your software.\n\n### Security Policies\n\n* This API requires one of the following user roles: AccountAdmin, BatchServiceAdmin, CompanyAdmin, CSPTester, SSTAdmin, TechnicalSupportAdmin.\n"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                items:
                - itemCode: CHIP1041
                  description: Potato Chips
                  itemGroup: Packaged Food
                  taxCode: PF051578
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      - name: X-Avalara-Client
        in: header
        schema:
          type: string
        description: Identifies the software you are using to call this API. For more information on the client header, see [Client Headers](https://developer.avalara.com/avatax/client-headers/).
        example: AvaTax Postman Collection
      - name: companyId
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
components:
  schemas:
    FetchResult_ItemModel:
      type: object
      properties:
        '@recordsetCount':
          type: integer
        value:
          type: array
          items:
            $ref: '#/components/schemas/ItemModel'
    ItemModel:
      type: object
      properties:
        id:
          type: integer
          format: int64
        companyId:
          type: integer
        itemCode:
          type: string
          description: Unique code for this item
        taxCode:
          type: string
          description: Avalara tax code for this item
        description:
          type: string
        category:
          type: string
  parameters:
    companyId:
      name: companyId
      in: path
      required: true
      schema:
        type: integer
      description: The numeric ID of the company
    top:
      name: $top
      in: query
      schema:
        type: integer
        default: 1000
      description: Maximum number of results to return
    filter:
      name: $filter
      in: query
      schema:
        type: string
      description: OData filter expression for result filtering
    skip:
      name: $skip
      in: query
      schema:
        type: integer
        default: 0
      description: Number of results to skip for pagination
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.0 bearer token
