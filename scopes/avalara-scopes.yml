generated: '2026-06-20'
method: searched
source: https://identity.avalara.com/.well-known/openid-configuration
docs: https://developer.avalara.com/api-reference/oauth/oauth/
notes: >-
  Avalara authenticates via IdentityServer at identity.avalara.com. The OpenID
  Connect discovery document publishes the full OAuth 2.0 surface: authorization,
  token, introspection, revocation, device-authorization and userinfo endpoints,
  the supported grant types, and the scopes_supported list captured below. The
  per-API OpenAPI specs model calls with HTTP basic/bearer (see authentication/),
  but the platform-level authorization is OAuth 2.0 / OIDC against this issuer.
issuer: https://identity.avalara.com
endpoints:
  authorization: https://identity.avalara.com/connect/authorize
  token: https://identity.avalara.com/connect/token
  userinfo: https://identity.avalara.com/connect/userinfo
  introspection: https://identity.avalara.com/connect/introspect
  revocation: https://identity.avalara.com/connect/revocation
  device_authorization: https://identity.avalara.com/connect/deviceauthorization
  end_session: https://identity.avalara.com/connect/endsession
  jwks: https://identity.avalara.com/.well-known/openid-configuration/jwks
  registration: https://identity.avalara.com/register/public
grant_types_supported:
  - authorization_code
  - client_credentials
  - refresh_token
  - implicit
  - password
  - urn:ietf:params:oauth:grant-type:device_code
  - urn:ietf:params:oauth:grant-type:token-exchange
code_challenge_methods_supported: [plain, S256]
token_endpoint_auth_methods_supported:
  - client_secret_basic
  - client_secret_post
  - private_key_jwt
scopes:
