  accounts are free and created from the developer portal; a 90-day AvaTax free
  trial is also offered. Sandbox credentials are distinct from production and
  produce no filing/production impact. Avalara does not publish "magic" test card
  or identifier values (tax calculation is address/jurisdiction driven), so none
  are fabricated here — only the published sandbox hosts and account model.
