    production_base_url: https://rest.avatax.com
  - product: Avalara platform APIs (1099, classification, e-invoicing, etc.)
    sandbox_base_url: https://api.sbx.avalara.com
    production_base_url: https://api.avalara.com
  - product: AvaTax Brazil
    sandbox_base_url: https://avataxbr-sandbox.avalarabrasil.com.br/v3
    production_base_url: null
account_model:
  free_sandbox: true
  signup: https://developer.avalara.com/freeTrial/
  free_trial: 90-day AvaTax free trial
  separation: >-
    Sandbox and production use different base hosts and different account
    credentials; sandbox activity has no production/filing effect.
test_values:
