# Curated top Avalara integrations grouped by category.
# Each entry becomes one Naftiko capability YAML in integrations/.
# Categories reflect Avalara's real ecosystem: e-commerce, ERP, billing, CRM,
# and exemption-certificate management around AvaTax + Returns + CertCapture.

# Payments / checkout (1)
- partner: stripe
  name: Calculate Avalara tax on Stripe Checkout sessions
  category: Payments
  use_case: Before creating a Stripe Checkout Session, call AvaTax createTransaction to compute the correct tax line and attach it to the session totals.
  partner_baseUri: https://api.stripe.com
  partner_api: Stripe API
  provider_ops:
    - method: POST
      path: /api/v2/transactions/create
      name: createTransaction
      description: AvaTax — create a tax transaction for the cart and return the tax-included totals.
    - method: POST
      path: /api/v2/addresses/resolve
      name: resolveAddress
      description: AvaTax — validate and resolve the shipping address before tax determination.
  partner_ops:
    - method: POST
      path: /v1/checkout/sessions
      name: createCheckoutSession
    - method: GET
      path: /v1/checkout/sessions/{session}
      name: getCheckoutSession

# E-commerce platforms (4)
- partner: shopify
  name: Calculate Avalara sales tax for Shopify orders
  category: E-commerce
  use_case: For each Shopify order, call AvaTax createTransaction to determine sales tax, then commit on order fulfillment so Avalara Returns can file accurately.
  partner_baseUri: https://yourshop.myshopify.com
  partner_api: Shopify Admin REST API
  provider_ops:
    - method: POST
      path: /api/v2/transactions/create
      name: createTransaction
      description: AvaTax — create a tax transaction for the Shopify order.
    - method: POST
      path: /api/v2/companies/{companyCode}/transactions/{transactionCode}/commit
      name: commitTransaction
      description: AvaTax — commit the transaction so it counts for filing.
  partner_ops:
    - method: GET
      path: /admin/api/2024-04/orders/{order_id}.json
      name: getOrder
    - method: POST
      path: /admin/api/2024-04/orders.json
      name: createOrder

- partner: bigcommerce
  name: Apply Avalara AvaTax to BigCommerce carts
  category: E-commerce
  use_case: When a BigCommerce cart updates, call AvaTax to compute line-level tax and write the rates back so checkout shows the correct totals.
  partner_baseUri: https://api.bigcommerce.com
  partner_api: BigCommerce v3 API
  provider_ops:
    - method: POST
      path: /api/v2/transactions/create
      name: createTransaction
      description: AvaTax — calculate tax for the BigCommerce cart.
    - method: POST
      path: /api/v2/addresses/resolve
      name: resolveAddress
      description: AvaTax — resolve the customer shipping address.
  partner_ops:
    - method: GET
      path: /stores/{store_hash}/v3/carts/{cartId}
      name: getCart
    - method: PUT
      path: /stores/{store_hash}/v3/carts/{cartId}
      name: updateCart

- partner: magento
  name: Replace Magento native tax with Avalara AvaTax
  category: E-commerce
  use_case: Replace Magento's built-in tax engine with AvaTax for every quote-to-order so multi-jurisdiction U.S. sales tax is correct.
  partner_baseUri: https://yourstore.com
  partner_api: Magento REST API
  provider_ops:
    - method: POST
      path: /api/v2/transactions/create
      name: createTransaction
      description: AvaTax — compute tax for the Magento quote.
    - method: POST
      path: /api/v2/companies/{companyCode}/transactions/{transactionCode}/commit
      name: commitTransaction
      description: AvaTax — commit the transaction on order placement.
  partner_ops:
    - method: GET
      path: /rest/V1/orders/{id}
      name: getOrder
    - method: POST
      path: /rest/V1/orders
      name: createOrder

- partner: woocommerce
  name: Add Avalara tax determination to WooCommerce checkout
  category: E-commerce
  use_case: For each WooCommerce order, call AvaTax createTransaction to compute the correct sales tax and write it back to the order before payment capture.
  partner_baseUri: https://yourstore.com
  partner_api: WooCommerce REST API
  provider_ops:
    - method: POST
      path: /api/v2/transactions/create
      name: createTransaction
      description: AvaTax — calculate tax for the WooCommerce order.
    - method: POST
      path: /api/v2/companies/{companyCode}/transactions/{transactionCode}/void
      name: voidTransaction
      description: AvaTax — void the tax transaction if the order is canceled.
  partner_ops:
    - method: GET
      path: /wp-json/wc/v3/orders/{id}
      name: getOrder
    - method: PUT
      path: /wp-json/wc/v3/orders/{id}
      name: updateOrder

# CRM / CPQ (1)
- partner: salesforce-cpq
  name: Tax-aware quotes in Salesforce CPQ via Avalara
  category: CPQ
  use_case: When a Salesforce CPQ Quote is generated, call AvaTax to determine the correct line-item tax and write it back to the SBQQ__Quote__c record so reps see a tax-accurate quote.
  partner_baseUri: https://yourinstance.my.salesforce.com
  partner_api: Salesforce CPQ REST API
  provider_ops:
    - method: POST
      path: /api/v2/transactions/create
      name: createTransaction
      description: AvaTax — calculate tax for the Salesforce CPQ quote.
    - method: GET
      path: /api/v2/companies/{companyId}/customers
      name: queryCustomers
      description: AvaTax — look up the exemption / tax profile of the customer.
  partner_ops:
    - method: GET
      path: /services/data/v60.0/sobjects/SBQQ__Quote__c/{id}
      name: getQuote
    - method: PATCH
      path: /services/data/v60.0/sobjects/SBQQ__Quote__c/{id}
      name: updateQuote

# ERP (3)
- partner: netsuite
  name: Sync AvaTax transactions into NetSuite invoices
  category: ERP
  use_case: For each NetSuite invoice posted, mirror it as a committed AvaTax transaction so Returns has the underlying liability and NetSuite has the right tax lines.
  partner_baseUri: https://yourcompany.suitetalk.api.netsuite.com
  partner_api: NetSuite SuiteTalk REST
  provider_ops:
    - method: POST
      path: /api/v2/transactions/create
      name: createTransaction
      description: AvaTax — create a tax transaction matching the NetSuite invoice.
    - method: POST
      path: /api/v2/companies/{companyCode}/transactions/{transactionCode}/commit
      name: commitTransaction
      description: AvaTax — commit the transaction once the invoice is finalized.
    - method: POST
      path: /api/v2/companies/{companyCode}/transactions/{transactionCode}/adjust
      name: adjustTransaction
      description: AvaTax — adjust the tax transaction when the NetSuite invoice is edited.
  partner_ops:
    - method: GET
      path: /services/rest/record/v1/invoice/{id}
      name: getInvoice
    - method: POST
      path: /services/rest/record/v1/invoice
      name: createInvoice

- partner: microsoft-dynamics
  name: Drive Microsoft Dynamics 365 sales tax from Avalara
  category: ERP
  use_case: For Dynamics 365 sales orders, replace the native tax engine with AvaTax so U.S. multi-state and EU VAT determination is centralized.
  partner_baseUri: https://yourorg.api.crm.dynamics.com
  partner_api: Microsoft Dynamics 365 API
  provider_ops:
    - method: POST
      path: /api/v2/transactions/create
      name: createTransaction
      description: AvaTax — calculate tax for the Dynamics 365 sales order.
    - method: POST
      path: /api/v2/companies/{companyCode}/transactions/{transactionCode}/commit
      name: commitTransaction
      description: AvaTax — commit on order confirmation.
  partner_ops:
    - method: GET
      path: /api/data/v9.2/salesorders({id})
      name: getSalesOrder
    - method: PATCH
      path: /api/data/v9.2/salesorders({id})
      name: updateSalesOrder

- partner: sap-s4hana
  name: VAT determination for SAP S/4HANA via Avalara
  category: ERP
  use_case: Route SAP S/4HANA sales-document tax events through AvaTax for EU VAT and global indirect-tax determination, replacing per-country rate tables.
  partner_baseUri: https://yourhost.s4hana.cloud.sap
  partner_api: SAP S/4HANA Cloud SD API
  provider_ops:
    - method: POST
      path: /api/v2/transactions/create
      name: createTransaction
      description: AvaTax — calculate VAT for the SAP sales document.
    - method: POST
      path: /api/v2/companies/{companyCode}/transactions/{transactionCode}/commit
      name: commitTransaction
      description: AvaTax — commit the VAT transaction once the SAP document posts.
  partner_ops:
    - method: GET
      path: /sap/opu/odata/sap/API_SALES_ORDER_SRV/A_SalesOrder('{SalesOrder}')
      name: getSalesOrder
    - method: POST
      path: /sap/opu/odata/sap/API_SALES_ORDER_SRV/A_SalesOrder
      name: createSalesOrder

# Accounting (3)
- partner: quickbooks
  name: Push Avalara tax lines into QuickBooks Online invoices
  category: Accounting
  use_case: For each AvaTax-committed transaction, write the matching tax line into a QuickBooks Online invoice so the GL stays in sync with what Returns will file.
  partner_baseUri: https://quickbooks.api.intuit.com
  partner_api: QuickBooks Online API
  provider_ops:
    - method: POST
      path: /api/v2/transactions/create
      name: createTransaction
      description: AvaTax — calculate tax for the QBO invoice.
    - method: POST
      path: /api/v2/companies/{companyCode}/transactions/{transactionCode}/commit
      name: commitTransaction
      description: AvaTax — commit the transaction on invoice send.
  partner_ops:
    - method: POST
      path: /v3/company/{realmId}/invoice
      name: createInvoice
    - method: GET
      path: /v3/company/{realmId}/invoice/{invoiceId}
      name: getInvoice

- partner: sage-intacct
  name: Apply AvaTax to Sage Intacct AR transactions
  category: Accounting
  use_case: For each Sage Intacct AR invoice, call AvaTax to determine sales tax and post the result back into the Intacct AR detail with a matched tax code.
  partner_baseUri: https://api.intacct.com
  partner_api: Sage Intacct API
  provider_ops:
    - method: POST
      path: /api/v2/transactions/create
      name: createTransaction
      description: AvaTax — compute tax for the Intacct AR invoice.
    - method: GET
      path: /api/v2/definitions/taxcodes
      name: listTaxCodes
      description: AvaTax — fetch valid AvaTax codes for mapping into Intacct.
  partner_ops:
    - method: POST
      path: /ia/xml/xmlgw.phtml
      name: createArInvoice

# Exemption certificates (1)
- partner: certcapture-salesforce
  name: Surface Avalara CertCapture exemptions inside Salesforce Accounts
  category: Compliance
  use_case: When a Salesforce Account is opened, fetch the matching CertCapture customer and active certificates so reps see exempt status without leaving Salesforce, and any new certificate uploaded in Salesforce is pushed into CertCapture.
  partner_baseUri: https://yourinstance.my.salesforce.com
  partner_api: Salesforce REST API
  provider_ops:
    - method: GET
      path: /customers
      name: queryCertCaptureCustomers
      description: CertCapture — search customers by external code / email.
    - method: GET
      path: /customers/{customerId}/certificates
      name: listCertificatesForCustomer
      description: CertCapture — list active exemption certificates for the customer.
    - method: POST
      path: /certificates
      name: createCertificate
      description: CertCapture — create a new exemption certificate from a Salesforce upload.
  partner_ops:
    - method: GET
      path: /services/data/v60.0/sobjects/Account/{id}
      name: getAccount
    - method: PATCH
      path: /services/data/v60.0/sobjects/Account/{id}
      name: updateAccount

# HCM / Financials (1)
- partner: workday-financials
  name: Push AvaTax tax determination into Workday Financials
  category: ERP
  use_case: For Workday Financials customer invoices, call AvaTax to determine tax then post the tax detail back to the Workday Customer Invoice so finance reporting and Returns stay aligned.
  partner_baseUri: https://yourhost.workday.com
  partner_api: Workday Financial Management API
  provider_ops:
    - method: POST
      path: /api/v2/transactions/create
      name: createTransaction
      description: AvaTax — calculate tax for the Workday customer invoice.
    - method: POST
      path: /api/v2/companies/{companyCode}/transactions/{transactionCode}/commit
      name: commitTransaction
      description: AvaTax — commit the transaction when Workday posts the invoice.
  partner_ops:
    - method: GET
      path: /ccx/api/financialManagement/v1/customerInvoices/{ID}
      name: getCustomerInvoice
    - method: POST
      path: /ccx/api/financialManagement/v1/customerInvoices
      name: createCustomerInvoice
