generated: '2026-06-20'
method: searched
source: https://developer.avalara.com/sdk/
notes: >-
  Avalara publishes first-party SDKs from the Avalara Developer Relations GitHub
  org (github.com/avadev). Two families: the per-API AvaTax REST v2 SDKs (name
  "avatax" / "Avalara" / "Avalara.AvaTax") and the newer unified "avalara-sdk"
  covering AvaTax, Communications, 1099 & W-9, and E-Invoicing.
