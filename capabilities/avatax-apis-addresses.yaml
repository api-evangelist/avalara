naftiko: 1.0.0-alpha2
info:
  label: Avalara AvaTax APIs — Addresses
  description: 'Avalara AvaTax APIs — Addresses. 2 operations. Lead operation: Avalara ResolveAddress. Self-contained Naftiko
    capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Addresses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: avatax-apis-addresses
    baseUri: http://{{baseurl}}
    description: Avalara AvaTax APIs — Addresses business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-addresses-resolve
      path: /api/v2/addresses/resolve
      operations:
      - name: get
        method: GET
        description: Avalara ResolveAddress
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Avalara-Client
          in: header
          type: string
          description: Identifies the software you are using to call this API. For more information on the client header,
            see [Client Headers](https://developer.avalara.com/avatax/cli
      - name: post
        method: POST
        description: Avalara ResolveAddressPost
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
        - name: X-Avalara-Client
          in: header
          type: string
          description: Identifies the software you are using to call this API. For more information on the client header,
            see [Client Headers](https://developer.avalara.com/avatax/cli
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.AVALARA_USER}}'
      password: '{{env.AVALARA_PASS}}'
  exposes:
  - type: rest
    namespace: avatax-apis-addresses-rest
    port: 8080
    description: REST adapter for Avalara AvaTax APIs — Addresses. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/addresses/resolve
      name: api-v2-addresses-resolve
      description: REST surface for api-v2-addresses-resolve.
      operations:
      - method: GET
        name: get
        description: Avalara ResolveAddress
        call: avatax-apis-addresses.get
        with:
          X-Avalara-Client: rest.X-Avalara-Client
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Avalara ResolveAddressPost
        call: avatax-apis-addresses.post
        with:
          Content-Type: rest.Content-Type
          X-Avalara-Client: rest.X-Avalara-Client
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: avatax-apis-addresses-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara AvaTax APIs — Addresses. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: avalara-resolveaddress
      description: Avalara ResolveAddress
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: avatax-apis-addresses.get
      with:
        X-Avalara-Client: tools.X-Avalara-Client
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-resolveaddresspost
      description: Avalara ResolveAddressPost
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: avatax-apis-addresses.post
      with:
        Content-Type: tools.Content-Type
        X-Avalara-Client: tools.X-Avalara-Client
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
