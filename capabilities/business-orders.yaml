naftiko: 1.0.0-alpha2
info:
  label: Avalara Business API — Orders
  description: 'Avalara Business API — Orders. 2 operations. Lead operation: Avalara Create a Sales Order. Self-contained
    Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-orders
    baseUri: https://api.avalara.com/business/v1
    description: Avalara Business API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: createorder
        method: POST
        description: Avalara Create a Sales Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-orderId
      path: /orders/{orderId}
      operations:
      - name: getorder
        method: GET
        description: Avalara Get Order Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: business-orders-rest
    port: 8080
    description: REST adapter for Avalara Business API — Orders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: POST
        name: createorder
        description: Avalara Create a Sales Order
        call: business-orders.createorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}
      name: orders-orderid
      description: REST surface for orders-orderId.
      operations:
      - method: GET
        name: getorder
        description: Avalara Get Order Details
        call: business-orders.getorder
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara Business API — Orders. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: avalara-create-sales-order
      description: Avalara Create a Sales Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: business-orders.createorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-get-order-details
      description: Avalara Get Order Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: business-orders.getorder
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
