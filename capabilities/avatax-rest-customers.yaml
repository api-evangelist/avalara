naftiko: 1.0.0-alpha2
info:
  label: Avalara AvaTax REST API — Customers
  description: 'Avalara AvaTax REST API — Customers. 2 operations. Lead operation: Avalara List Customers for a Company. Self-contained
    Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Customers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: avatax-rest-customers
    baseUri: https://rest.avatax.com
    description: Avalara AvaTax REST API — Customers business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-companies-companyId-customers
      path: /api/v2/companies/{companyId}/customers
      operations:
      - name: querycustomers
        method: GET
        description: Avalara List Customers for a Company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcustomer
        method: POST
        description: Avalara Create a New Customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: avatax-rest-customers-rest
    port: 8080
    description: REST adapter for Avalara AvaTax REST API — Customers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/companies/{companyid}/customers
      name: api-v2-companies-companyid-customers
      description: REST surface for api-v2-companies-companyId-customers.
      operations:
      - method: GET
        name: querycustomers
        description: Avalara List Customers for a Company
        call: avatax-rest-customers.querycustomers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcustomer
        description: Avalara Create a New Customer
        call: avatax-rest-customers.createcustomer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: avatax-rest-customers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara AvaTax REST API — Customers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: avalara-list-customers-company
      description: Avalara List Customers for a Company
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: avatax-rest-customers.querycustomers
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-create-new-customer
      description: Avalara Create a New Customer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: avatax-rest-customers.createcustomer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
