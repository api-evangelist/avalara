naftiko: 1.0.0-alpha2
info:
  label: Avalara Excise Platform API — Tax Determination
  description: 'Avalara Excise Platform API — Tax Determination. 1 operations. Lead operation: Avalara Calculate Excise Taxes.
    Self-contained Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Tax Determination
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: excise-tax-determination
    baseUri: https://exciseapi.avalara.com/api/v1
    description: Avalara Excise Platform API — Tax Determination business capability. Self-contained, no shared references.
    resources:
    - name: TaxDetermination
      path: /TaxDetermination
      operations:
      - name: calculateexcisetax
        method: POST
        description: Avalara Calculate Excise Taxes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: excise-tax-determination-rest
    port: 8080
    description: REST adapter for Avalara Excise Platform API — Tax Determination. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/taxdetermination
      name: taxdetermination
      description: REST surface for TaxDetermination.
      operations:
      - method: POST
        name: calculateexcisetax
        description: Avalara Calculate Excise Taxes
        call: excise-tax-determination.calculateexcisetax
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: excise-tax-determination-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara Excise Platform API — Tax Determination. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: avalara-calculate-excise-taxes
      description: Avalara Calculate Excise Taxes
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: excise-tax-determination.calculateexcisetax
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
