naftiko: 1.0.0-alpha1
info:
  label: Avalara E-Invoicing API
  description: E-invoicing compliance workflows for cross-border and domestic mandates.
  tags:
  - Avalara
  - E-Invoicing
  - Compliance
  - Tax
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AVALARA_BEARER_TOKEN: AVALARA_BEARER_TOKEN
capability:
  consumes:
  - type: http
    namespace: einvoicing
    baseUri: https://einvoicing.api.avalara.com
    description: Avalara E-Invoicing REST API
    authentication:
      type: bearer
      token: '{{AVALARA_BEARER_TOKEN}}'
    resources:
    - name: mandates
      path: /einvoicing/v1/mandates
      description: E-invoicing mandates by country
      operations:
      - name: list-mandates
        method: GET
        description: List supported e-invoicing mandates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: documents
      path: /einvoicing/v1/documents
      description: E-invoicing document submissions
      operations:
      - name: submit-document
        method: POST
        description: Submit an e-invoice document for compliance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-documents
        method: GET
        description: List submitted e-invoice documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8102
    namespace: einvoicing-rest
    resources:
    - path: /v1/mandates
      name: mandates
      description: E-invoicing mandates
      operations:
      - method: GET
        name: list-mandates
        description: List e-invoicing mandates
        call: einvoicing.list-mandates
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9102
    namespace: einvoicing-mcp
    transport: http
    tools:
    - name: list-einvoicing-mandates
      description: List e-invoicing compliance mandates by country
      hints:
        readOnly: true
        openWorld: true
      call: einvoicing.list-mandates
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-einvoice
      description: Submit an e-invoice document for cross-border compliance
      hints:
        readOnly: false
        openWorld: true
      call: einvoicing.submit-document
      outputParameters:
      - type: object
        mapping: $.
