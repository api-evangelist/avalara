naftiko: 1.0.0-alpha1
info:
  label: Avalara AvaTax REST API
  description: Real-time sales tax, VAT, and GST calculation for transactions across all jurisdictions.
  tags:
  - Avalara
  - Sales Tax
  - VAT
  - GST
  - Tax Calculation
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AVALARA_USERNAME: AVALARA_USERNAME
    AVALARA_PASSWORD: AVALARA_PASSWORD
capability:
  consumes:
  - type: http
    namespace: avatax
    baseUri: https://rest.avatax.com
    description: AvaTax REST v2 API
    authentication:
      type: basic
      username: '{{AVALARA_USERNAME}}'
      password: '{{AVALARA_PASSWORD}}'
    resources:
    - name: transactions
      path: /api/v2/companies/{companyCode}/transactions
      description: Tax transactions
      operations:
      - name: create-transaction
        method: POST
        description: Create a transaction and calculate tax
        inputParameters:
        - name: companyCode
          in: path
          type: string
          required: true
          description: Company code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-transactions
        method: GET
        description: List transactions for a company
        inputParameters:
        - name: companyCode
          in: path
          type: string
          required: true
          description: Company code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: addresses
      path: /api/v2/addresses/resolve
      description: Address validation and tax jurisdiction determination
      operations:
      - name: resolve-address
        method: GET
        description: Validate and resolve a US or Canada address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8100
    namespace: avatax-rest
    resources:
    - path: /v1/transactions
      name: transactions
      description: Tax transactions
      operations:
      - method: POST
        name: calculate-tax
        description: Calculate tax for a transaction
        call: avatax.create-transaction
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9100
    namespace: avatax-mcp
    transport: http
    tools:
    - name: calculate-sales-tax
      description: Calculate sales tax, VAT, or GST for a transaction
      hints:
        readOnly: false
        openWorld: true
      call: avatax.create-transaction
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-address
      description: Validate a postal address and determine tax jurisdiction
      hints:
        readOnly: true
        openWorld: true
      call: avatax.resolve-address
      outputParameters:
      - type: object
        mapping: $.
    - name: list-company-transactions
      description: List tax transactions for a company
      hints:
        readOnly: true
        openWorld: true
      call: avatax.list-transactions
      outputParameters:
      - type: object
        mapping: $.
