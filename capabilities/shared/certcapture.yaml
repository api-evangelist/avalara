naftiko: 1.0.0-alpha1
info:
  label: Avalara CertCapture API
  description: Tax exemption certificate document management.
  tags:
  - Avalara
  - Certificates
  - Exemptions
  - Tax
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    CERTCAPTURE_TOKEN: CERTCAPTURE_TOKEN
capability:
  consumes:
  - type: http
    namespace: certcapture
    baseUri: https://api.certcapture.com
    description: CertCapture REST API
    authentication:
      type: bearer
      token: '{{CERTCAPTURE_TOKEN}}'
    resources:
    - name: certificates
      path: /v2/certificates
      description: Exemption certificates
      operations:
      - name: list-certificates
        method: GET
        description: List exemption certificates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-certificate
        method: POST
        description: Create new exemption certificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: customers
      path: /v2/customers
      description: Customer accounts
      operations:
      - name: list-customers
        method: GET
        description: List customers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8101
    namespace: certcapture-rest
    resources:
    - path: /v1/certificates
      name: certificates
      description: Exemption certificates
      operations:
      - method: GET
        name: list-certificates
        description: List certificates
        call: certcapture.list-certificates
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9101
    namespace: certcapture-mcp
    transport: http
    tools:
    - name: list-exemption-certificates
      description: List tax exemption certificates
      hints:
        readOnly: true
        openWorld: true
      call: certcapture.list-certificates
      outputParameters:
      - type: object
        mapping: $.
    - name: create-exemption-certificate
      description: Create a new tax exemption certificate
      hints:
        readOnly: false
        openWorld: false
      call: certcapture.create-certificate
      outputParameters:
      - type: object
        mapping: $.
