naftiko: 1.0.0-alpha2
info:
  label: Avalara Excise Platform API — Licenses
  description: 'Avalara Excise Platform API — Licenses. 1 operations. Lead operation: Avalara List Excise Licenses. Self-contained
    Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Licenses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: excise-licenses
    baseUri: https://exciseapi.avalara.com/api/v1
    description: Avalara Excise Platform API — Licenses business capability. Self-contained, no shared references.
    resources:
    - name: Licenses
      path: /Licenses
      operations:
      - name: listlicenses
        method: GET
        description: Avalara List Excise Licenses
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: excise-licenses-rest
    port: 8080
    description: REST adapter for Avalara Excise Platform API — Licenses. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/licenses
      name: licenses
      description: REST surface for Licenses.
      operations:
      - method: GET
        name: listlicenses
        description: Avalara List Excise Licenses
        call: excise-licenses.listlicenses
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: excise-licenses-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara Excise Platform API — Licenses. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: avalara-list-excise-licenses
      description: Avalara List Excise Licenses
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: excise-licenses.listlicenses
      outputParameters:
      - type: object
        mapping: $.
