naftiko: 1.0.0-alpha2
info:
  label: Avalara VAT Reporting API — Filing Calendar
  description: 'Avalara VAT Reporting API — Filing Calendar. 1 operations. Lead operation: Avalara List Filing Calendar Obligations.
    Self-contained Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Filing Calendar
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: vat-reporting-filing-calendar
    baseUri: https://api.avalara.com/vat-reporting/v1
    description: Avalara VAT Reporting API — Filing Calendar business capability. Self-contained, no shared references.
    resources:
    - name: filing-calendars
      path: /filing-calendars
      operations:
      - name: listfilingcalendars
        method: GET
        description: Avalara List Filing Calendar Obligations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: countryCode
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: vat-reporting-filing-calendar-rest
    port: 8080
    description: REST adapter for Avalara VAT Reporting API — Filing Calendar. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/filing-calendars
      name: filing-calendars
      description: REST surface for filing-calendars.
      operations:
      - method: GET
        name: listfilingcalendars
        description: Avalara List Filing Calendar Obligations
        call: vat-reporting-filing-calendar.listfilingcalendars
        with:
          countryCode: rest.countryCode
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vat-reporting-filing-calendar-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara VAT Reporting API — Filing Calendar. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: avalara-list-filing-calendar-obligations
      description: Avalara List Filing Calendar Obligations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vat-reporting-filing-calendar.listfilingcalendars
      with:
        countryCode: tools.countryCode
      outputParameters:
      - type: object
        mapping: $.
