naftiko: 1.0.0-alpha2
info:
  label: Avalara AvaTax REST API — Items
  description: 'Avalara AvaTax REST API — Items. 2 operations. Lead operation: Avalara List Items for a Company. Self-contained
    Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Items
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: avatax-rest-items
    baseUri: https://rest.avatax.com
    description: Avalara AvaTax REST API — Items business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-companies-companyId-items
      path: /api/v2/companies/{companyId}/items
      operations:
      - name: queryitems
        method: GET
        description: Avalara List Items for a Company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createitems
        method: POST
        description: Avalara Create Items for a Company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: avatax-rest-items-rest
    port: 8080
    description: REST adapter for Avalara AvaTax REST API — Items. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/companies/{companyid}/items
      name: api-v2-companies-companyid-items
      description: REST surface for api-v2-companies-companyId-items.
      operations:
      - method: GET
        name: queryitems
        description: Avalara List Items for a Company
        call: avatax-rest-items.queryitems
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createitems
        description: Avalara Create Items for a Company
        call: avatax-rest-items.createitems
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: avatax-rest-items-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara AvaTax REST API — Items. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: avalara-list-items-company
      description: Avalara List Items for a Company
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: avatax-rest-items.queryitems
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-create-items-company
      description: Avalara Create Items for a Company
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: avatax-rest-items.createitems
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
