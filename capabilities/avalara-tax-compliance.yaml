naftiko: 1.0.0-alpha1
info:
  label: Avalara Tax Compliance Automation
  description: Unified workflow for automated tax compliance combining sales tax calculation, exemption certificate management, and e-invoicing. Used by tax teams, finance departments, and ERP 
    integrators to automate end-to-end tax compliance.
  tags:
  - Avalara
  - Tax Compliance
  - Sales Tax
  - E-Invoicing
  - Exemptions
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AVALARA_USERNAME: AVALARA_USERNAME
    AVALARA_PASSWORD: AVALARA_PASSWORD
    CERTCAPTURE_TOKEN: CERTCAPTURE_TOKEN
    AVALARA_BEARER_TOKEN: AVALARA_BEARER_TOKEN
capability:
  consumes:
  - import: avatax
    location: ./shared/avatax.yaml
  - import: certcapture
    location: ./shared/certcapture.yaml
  - import: einvoicing
    location: ./shared/einvoicing.yaml
  exposes:
  - type: rest
    port: 8080
    namespace: avalara-compliance-api
    description: Unified REST API for Avalara tax compliance automation.
    resources:
    - path: /v1/transactions
      name: transactions
      description: Tax calculations for transactions
      operations:
      - method: POST
        name: calculate-tax
        description: Calculate sales tax, VAT, or GST
        call: avatax.create-transaction
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: list-transactions
        description: List tax transactions
        call: avatax.list-transactions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/addresses
      name: addresses
      description: Address validation
      operations:
      - method: GET
        name: validate-address
        description: Validate postal address and determine jurisdiction
        call: avatax.resolve-address
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/certificates
      name: certificates
      description: Tax exemption certificates
      operations:
      - method: GET
        name: list-certificates
        description: List exemption certificates
        call: certcapture.list-certificates
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-certificate
        description: Create exemption certificate
        call: certcapture.create-certificate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/einvoicing/mandates
      name: einvoicing-mandates
      description: E-invoicing mandate requirements
      operations:
      - method: GET
        name: list-mandates
        description: List e-invoicing mandates by country
        call: einvoicing.list-mandates
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/einvoicing/documents
      name: einvoicing-documents
      description: E-invoice submission
      operations:
      - method: POST
        name: submit-einvoice
        description: Submit e-invoice for compliance
        call: einvoicing.submit-document
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: avalara-compliance-mcp
    transport: http
    description: MCP server for AI-assisted tax compliance automation.
    tools:
    - name: calculate-sales-tax
      description: Calculate sales tax, VAT, or GST for a transaction across all jurisdictions
      hints:
        readOnly: false
        openWorld: true
      call: avatax.create-transaction
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-postal-address
      description: Validate a postal address and determine the applicable tax jurisdiction
      hints:
        readOnly: true
        openWorld: true
      call: avatax.resolve-address
      outputParameters:
      - type: object
        mapping: $.
    - name: list-tax-transactions
      description: List historical tax transactions for audit and reconciliation
      hints:
        readOnly: true
        openWorld: true
      call: avatax.list-transactions
      outputParameters:
      - type: object
        mapping: $.
    - name: list-exemption-certificates
      description: List tax exemption certificates for exempt customers
      hints:
        readOnly: true
        openWorld: true
      call: certcapture.list-certificates
      outputParameters:
      - type: object
        mapping: $.
    - name: create-exemption-certificate
      description: Create a new tax exemption certificate for a customer
      hints:
        readOnly: false
        openWorld: false
      call: certcapture.create-certificate
      outputParameters:
      - type: object
        mapping: $.
    - name: list-customers
      description: List CertCapture customer accounts
      hints:
        readOnly: true
        openWorld: true
      call: certcapture.list-customers
      outputParameters:
      - type: object
        mapping: $.
    - name: check-einvoicing-mandate
      description: Check e-invoicing mandate requirements for a country
      hints:
        readOnly: true
        openWorld: true
      call: einvoicing.list-mandates
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-einvoice
      description: Submit an e-invoice document for cross-border or domestic compliance
      hints:
        readOnly: false
        openWorld: true
      call: einvoicing.submit-document
      outputParameters:
      - type: object
        mapping: $.
    - name: list-submitted-einvoices
      description: List submitted e-invoice documents and their status
      hints:
        readOnly: true
        openWorld: true
      call: einvoicing.list-documents
      outputParameters:
      - type: object
        mapping: $.
