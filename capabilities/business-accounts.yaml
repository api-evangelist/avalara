naftiko: 1.0.0-alpha2
info:
  label: Avalara Business API — Accounts
  description: 'Avalara Business API — Accounts. 2 operations. Lead operation: Avalara Register a New Customer Account. Self-contained
    Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-accounts
    baseUri: https://api.avalara.com/business/v1
    description: Avalara Business API — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: accounts
      path: /accounts
      operations:
      - name: createaccount
        method: POST
        description: Avalara Register a New Customer Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounts-accountId
      path: /accounts/{accountId}
      operations:
      - name: getaccount
        method: GET
        description: Avalara Get Account Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: business-accounts-rest
    port: 8080
    description: REST adapter for Avalara Business API — Accounts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts
      name: accounts
      description: REST surface for accounts.
      operations:
      - method: POST
        name: createaccount
        description: Avalara Register a New Customer Account
        call: business-accounts.createaccount
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}
      name: accounts-accountid
      description: REST surface for accounts-accountId.
      operations:
      - method: GET
        name: getaccount
        description: Avalara Get Account Details
        call: business-accounts.getaccount
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara Business API — Accounts. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: avalara-register-new-customer-account
      description: Avalara Register a New Customer Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: business-accounts.createaccount
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-get-account-details
      description: Avalara Get Account Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: business-accounts.getaccount
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
