naftiko: 1.0.0-alpha2
info:
  label: Avalara 1099 & W-9 API — W-9 Forms
  description: 'Avalara 1099 & W-9 API — W-9 Forms. 3 operations. Lead operation: Avalara Create a W-9 Collection Request.
    Self-contained Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - W-9 Forms
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: 1099-w9-w-9-forms
    baseUri: https://api.avalara.com/1099/v1
    description: Avalara 1099 & W-9 API — W-9 Forms business capability. Self-contained, no shared references.
    resources:
    - name: w9-requests
      path: /w9/requests
      operations:
      - name: createw9request
        method: POST
        description: Avalara Create a W-9 Collection Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listw9requests
        method: GET
        description: Avalara List W-9 Requests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: $top
          in: query
          type: integer
        - name: $skip
          in: query
          type: integer
    - name: w9-w9Id
      path: /w9/{w9Id}
      operations:
      - name: getw9
        method: GET
        description: Avalara Get a Completed W-9 Form
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: w9Id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: 1099-w9-w-9-forms-rest
    port: 8080
    description: REST adapter for Avalara 1099 & W-9 API — W-9 Forms. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/w9/requests
      name: w9-requests
      description: REST surface for w9-requests.
      operations:
      - method: POST
        name: createw9request
        description: Avalara Create a W-9 Collection Request
        call: 1099-w9-w-9-forms.createw9request
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listw9requests
        description: Avalara List W-9 Requests
        call: 1099-w9-w-9-forms.listw9requests
        with:
          status: rest.status
          $top: rest.$top
          $skip: rest.$skip
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/w9/{w9id}
      name: w9-w9id
      description: REST surface for w9-w9Id.
      operations:
      - method: GET
        name: getw9
        description: Avalara Get a Completed W-9 Form
        call: 1099-w9-w-9-forms.getw9
        with:
          w9Id: rest.w9Id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: 1099-w9-w-9-forms-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara 1099 & W-9 API — W-9 Forms. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: avalara-create-w-9-collection
      description: Avalara Create a W-9 Collection Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: 1099-w9-w-9-forms.createw9request
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-list-w-9-requests
      description: Avalara List W-9 Requests
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: 1099-w9-w-9-forms.listw9requests
      with:
        status: tools.status
        $top: tools.$top
        $skip: tools.$skip
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-get-completed-w-9
      description: Avalara Get a Completed W-9 Form
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: 1099-w9-w-9-forms.getw9
      with:
        w9Id: tools.w9Id
      outputParameters:
      - type: object
        mapping: $.
