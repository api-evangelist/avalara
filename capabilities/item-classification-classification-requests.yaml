naftiko: 1.0.0-alpha2
info:
  label: Avalara Item Classification API — Classification Requests
  description: 'Avalara Item Classification API — Classification Requests. 3 operations. Lead operation: Avalara Submit Products
    for Classification. Self-contained Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Classification Requests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: item-classification-classification-requests
    baseUri: https://api.avalara.com/classification/v2
    description: Avalara Item Classification API — Classification Requests business capability. Self-contained, no shared
      references.
    resources:
    - name: classification-requests
      path: /classification-requests
      operations:
      - name: createclassificationrequest
        method: POST
        description: Avalara Submit Products for Classification
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listclassificationrequests
        method: GET
        description: Avalara List Classification Requests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: $top
          in: query
          type: integer
        - name: $skip
          in: query
          type: integer
    - name: classification-requests-requestId
      path: /classification-requests/{requestId}
      operations:
      - name: getclassificationrequest
        method: GET
        description: Avalara Get Classification Request Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: requestId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: item-classification-classification-requests-rest
    port: 8080
    description: REST adapter for Avalara Item Classification API — Classification Requests. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/classification-requests
      name: classification-requests
      description: REST surface for classification-requests.
      operations:
      - method: POST
        name: createclassificationrequest
        description: Avalara Submit Products for Classification
        call: item-classification-classification-requests.createclassificationrequest
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listclassificationrequests
        description: Avalara List Classification Requests
        call: item-classification-classification-requests.listclassificationrequests
        with:
          status: rest.status
          $top: rest.$top
          $skip: rest.$skip
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/classification-requests/{requestid}
      name: classification-requests-requestid
      description: REST surface for classification-requests-requestId.
      operations:
      - method: GET
        name: getclassificationrequest
        description: Avalara Get Classification Request Status
        call: item-classification-classification-requests.getclassificationrequest
        with:
          requestId: rest.requestId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: item-classification-classification-requests-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara Item Classification API — Classification Requests. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: avalara-submit-products-classification
      description: Avalara Submit Products for Classification
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: item-classification-classification-requests.createclassificationrequest
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-list-classification-requests
      description: Avalara List Classification Requests
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: item-classification-classification-requests.listclassificationrequests
      with:
        status: tools.status
        $top: tools.$top
        $skip: tools.$skip
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-get-classification-request-status
      description: Avalara Get Classification Request Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: item-classification-classification-requests.getclassificationrequest
      with:
        requestId: tools.requestId
      outputParameters:
      - type: object
        mapping: $.
