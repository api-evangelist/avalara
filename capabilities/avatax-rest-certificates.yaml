naftiko: 1.0.0-alpha2
info:
  label: Avalara AvaTax REST API — Certificates
  description: 'Avalara AvaTax REST API — Certificates. 2 operations. Lead operation: Avalara List Certificates for a Company.
    Self-contained Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Certificates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: avatax-rest-certificates
    baseUri: https://rest.avatax.com
    description: Avalara AvaTax REST API — Certificates business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-companies-companyId-certificates
      path: /api/v2/companies/{companyId}/certificates
      operations:
      - name: querycertificates
        method: GET
        description: Avalara List Certificates for a Company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcertificate
        method: POST
        description: Avalara Create a New Certificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: avatax-rest-certificates-rest
    port: 8080
    description: REST adapter for Avalara AvaTax REST API — Certificates. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/companies/{companyid}/certificates
      name: api-v2-companies-companyid-certificates
      description: REST surface for api-v2-companies-companyId-certificates.
      operations:
      - method: GET
        name: querycertificates
        description: Avalara List Certificates for a Company
        call: avatax-rest-certificates.querycertificates
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcertificate
        description: Avalara Create a New Certificate
        call: avatax-rest-certificates.createcertificate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: avatax-rest-certificates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara AvaTax REST API — Certificates. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: avalara-list-certificates-company
      description: Avalara List Certificates for a Company
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: avatax-rest-certificates.querycertificates
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-create-new-certificate
      description: Avalara Create a New Certificate
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: avatax-rest-certificates.createcertificate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
