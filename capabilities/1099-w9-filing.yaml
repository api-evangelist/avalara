naftiko: 1.0.0-alpha2
info:
  label: Avalara 1099 & W-9 API — Filing
  description: 'Avalara 1099 & W-9 API — Filing. 2 operations. Lead operation: Avalara Submit Forms for E-filing. Self-contained
    Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Filing
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: 1099-w9-filing
    baseUri: https://api.avalara.com/1099/v1
    description: Avalara 1099 & W-9 API — Filing business capability. Self-contained, no shared references.
    resources:
    - name: filing-submit
      path: /filing/submit
      operations:
      - name: submitfiling
        method: POST
        description: Avalara Submit Forms for E-filing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: filing-filingId-status
      path: /filing/{filingId}/status
      operations:
      - name: getfilingstatus
        method: GET
        description: Avalara Get Filing Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filingId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: 1099-w9-filing-rest
    port: 8080
    description: REST adapter for Avalara 1099 & W-9 API — Filing. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/filing/submit
      name: filing-submit
      description: REST surface for filing-submit.
      operations:
      - method: POST
        name: submitfiling
        description: Avalara Submit Forms for E-filing
        call: 1099-w9-filing.submitfiling
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/filing/{filingid}/status
      name: filing-filingid-status
      description: REST surface for filing-filingId-status.
      operations:
      - method: GET
        name: getfilingstatus
        description: Avalara Get Filing Status
        call: 1099-w9-filing.getfilingstatus
        with:
          filingId: rest.filingId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: 1099-w9-filing-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara 1099 & W-9 API — Filing. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: avalara-submit-forms-e-filing
      description: Avalara Submit Forms for E-filing
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: 1099-w9-filing.submitfiling
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-get-filing-status
      description: Avalara Get Filing Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: 1099-w9-filing.getfilingstatus
      with:
        filingId: tools.filingId
      outputParameters:
      - type: object
        mapping: $.
