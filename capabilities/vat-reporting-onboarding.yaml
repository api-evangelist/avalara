naftiko: 1.0.0-alpha2
info:
  label: Avalara VAT Reporting API — Onboarding
  description: 'Avalara VAT Reporting API — Onboarding. 1 operations. Lead operation: Avalara Onboard a Company for VAT Reporting.
    Self-contained Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Onboarding
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: vat-reporting-onboarding
    baseUri: https://api.avalara.com/vat-reporting/v1
    description: Avalara VAT Reporting API — Onboarding business capability. Self-contained, no shared references.
    resources:
    - name: onboarding
      path: /onboarding
      operations:
      - name: onboardcompany
        method: POST
        description: Avalara Onboard a Company for VAT Reporting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: vat-reporting-onboarding-rest
    port: 8080
    description: REST adapter for Avalara VAT Reporting API — Onboarding. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/onboarding
      name: onboarding
      description: REST surface for onboarding.
      operations:
      - method: POST
        name: onboardcompany
        description: Avalara Onboard a Company for VAT Reporting
        call: vat-reporting-onboarding.onboardcompany
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vat-reporting-onboarding-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara VAT Reporting API — Onboarding. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: avalara-onboard-company-vat-reporting
      description: Avalara Onboard a Company for VAT Reporting
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vat-reporting-onboarding.onboardcompany
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
