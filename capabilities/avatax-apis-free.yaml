naftiko: 1.0.0-alpha2
info:
  label: Avalara AvaTax APIs — Free
  description: 'Avalara AvaTax APIs — Free. 1 operations. Lead operation: Avalara RequestFreeTrial. Self-contained Naftiko
    capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Free
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: avatax-apis-free
    baseUri: http://{{baseurl}}
    description: Avalara AvaTax APIs — Free business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-accounts-freetrials-request
      path: /api/v2/accounts/freetrials/request
      operations:
      - name: post
        method: POST
        description: Avalara RequestFreeTrial
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
        - name: X-Avalara-Client
          in: header
          type: string
          description: Identifies the software you are using to call this API. For more information on the client header,
            see [Client Headers](https://developer.avalara.com/avatax/cli
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.AVALARA_USER}}'
      password: '{{env.AVALARA_PASS}}'
  exposes:
  - type: rest
    namespace: avatax-apis-free-rest
    port: 8080
    description: REST adapter for Avalara AvaTax APIs — Free. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/accounts/freetrials/request
      name: api-v2-accounts-freetrials-request
      description: REST surface for api-v2-accounts-freetrials-request.
      operations:
      - method: POST
        name: post
        description: Avalara RequestFreeTrial
        call: avatax-apis-free.post
        with:
          Content-Type: rest.Content-Type
          X-Avalara-Client: rest.X-Avalara-Client
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: avatax-apis-free-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara AvaTax APIs — Free. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: avalara-requestfreetrial
      description: Avalara RequestFreeTrial
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: avatax-apis-free.post
      with:
        Content-Type: tools.Content-Type
        X-Avalara-Client: tools.X-Avalara-Client
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
