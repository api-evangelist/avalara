naftiko: 1.0.0-alpha2
info:
  label: Avalara E-Invoicing REST API — Mandates
  description: 'Avalara E-Invoicing REST API — Mandates. 1 operations. Lead operation: Avalara List E-invoicing Mandates.
    Self-contained Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Mandates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: e-invoicing-mandates
    baseUri: https://api.avalara.com/einvoicing/v1
    description: Avalara E-Invoicing REST API — Mandates business capability. Self-contained, no shared references.
    resources:
    - name: mandates
      path: /mandates
      operations:
      - name: listmandates
        method: GET
        description: Avalara List E-invoicing Mandates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: avalara-version
          in: header
          type: string
          required: true
        - name: $top
          in: query
          type: integer
        - name: $skip
          in: query
          type: integer
        - name: $filter
          in: query
          type: string
          description: OData filter expression
        - name: count
          in: query
          type: boolean
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: e-invoicing-mandates-rest
    port: 8080
    description: REST adapter for Avalara E-Invoicing REST API — Mandates. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/mandates
      name: mandates
      description: REST surface for mandates.
      operations:
      - method: GET
        name: listmandates
        description: Avalara List E-invoicing Mandates
        call: e-invoicing-mandates.listmandates
        with:
          avalara-version: rest.avalara-version
          $top: rest.$top
          $skip: rest.$skip
          $filter: rest.$filter
          count: rest.count
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: e-invoicing-mandates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara E-Invoicing REST API — Mandates. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: avalara-list-e-invoicing-mandates
      description: Avalara List E-invoicing Mandates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: e-invoicing-mandates.listmandates
      with:
        avalara-version: tools.avalara-version
        $top: tools.$top
        $skip: tools.$skip
        $filter: tools.$filter
        count: tools.count
      outputParameters:
      - type: object
        mapping: $.
