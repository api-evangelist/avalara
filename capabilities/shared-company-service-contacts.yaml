naftiko: 1.0.0-alpha2
info:
  label: Avalara Shared Company Service API — Contacts
  description: 'Avalara Shared Company Service API — Contacts. 2 operations. Lead operation: Avalara List Contacts for a Company.
    Self-contained Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: shared-company-service-contacts
    baseUri: https://api.avalara.com/shared/v1
    description: Avalara Shared Company Service API — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: companies-companyId-contacts
      path: /companies/{companyId}/contacts
      operations:
      - name: listcontacts
        method: GET
        description: Avalara List Contacts for a Company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: companyId
          in: path
          type: string
          required: true
      - name: createcontact
        method: POST
        description: Avalara Create a Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: companyId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: shared-company-service-contacts-rest
    port: 8080
    description: REST adapter for Avalara Shared Company Service API — Contacts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/companies/{companyid}/contacts
      name: companies-companyid-contacts
      description: REST surface for companies-companyId-contacts.
      operations:
      - method: GET
        name: listcontacts
        description: Avalara List Contacts for a Company
        call: shared-company-service-contacts.listcontacts
        with:
          companyId: rest.companyId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcontact
        description: Avalara Create a Contact
        call: shared-company-service-contacts.createcontact
        with:
          companyId: rest.companyId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: shared-company-service-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara Shared Company Service API — Contacts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: avalara-list-contacts-company
      description: Avalara List Contacts for a Company
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: shared-company-service-contacts.listcontacts
      with:
        companyId: tools.companyId
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-create-contact
      description: Avalara Create a Contact
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: shared-company-service-contacts.createcontact
      with:
        companyId: tools.companyId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
