naftiko: 1.0.0-alpha2
info:
  label: Avalara AvaTax REST API — Locations
  description: 'Avalara AvaTax REST API — Locations. 2 operations. Lead operation: Avalara List Locations for a Company. Self-contained
    Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Locations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: avatax-rest-locations
    baseUri: https://rest.avatax.com
    description: Avalara AvaTax REST API — Locations business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-companies-companyId-locations
      path: /api/v2/companies/{companyId}/locations
      operations:
      - name: querylocations
        method: GET
        description: Avalara List Locations for a Company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createlocations
        method: POST
        description: Avalara Create Locations for a Company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: avatax-rest-locations-rest
    port: 8080
    description: REST adapter for Avalara AvaTax REST API — Locations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/companies/{companyid}/locations
      name: api-v2-companies-companyid-locations
      description: REST surface for api-v2-companies-companyId-locations.
      operations:
      - method: GET
        name: querylocations
        description: Avalara List Locations for a Company
        call: avatax-rest-locations.querylocations
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createlocations
        description: Avalara Create Locations for a Company
        call: avatax-rest-locations.createlocations
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: avatax-rest-locations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara AvaTax REST API — Locations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: avalara-list-locations-company
      description: Avalara List Locations for a Company
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: avatax-rest-locations.querylocations
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-create-locations-company
      description: Avalara Create Locations for a Company
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: avatax-rest-locations.createlocations
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
