naftiko: 1.0.0-alpha2
info:
  label: Avalara AvaTax Brazil API — Companies
  description: 'Avalara AvaTax Brazil API — Companies. 2 operations. Lead operation: Avalara List Companies Configured for
    Brazil. Self-contained Naftiko capability covering one Avalara business surface.'
  tags:
  - Avalara
  - Companies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVALARA_API_KEY: AVALARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: avatax-brazil-companies
    baseUri: https://avataxbr-sandbox.avalarabrasil.com.br/v3
    description: Avalara AvaTax Brazil API — Companies business capability. Self-contained, no shared references.
    resources:
    - name: companies
      path: /companies
      operations:
      - name: listcompanies
        method: GET
        description: Avalara List Companies Configured for Brazil
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcompany
        method: POST
        description: Avalara Create a Company Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AVALARA_API_KEY}}'
  exposes:
  - type: rest
    namespace: avatax-brazil-companies-rest
    port: 8080
    description: REST adapter for Avalara AvaTax Brazil API — Companies. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/companies
      name: companies
      description: REST surface for companies.
      operations:
      - method: GET
        name: listcompanies
        description: Avalara List Companies Configured for Brazil
        call: avatax-brazil-companies.listcompanies
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcompany
        description: Avalara Create a Company Configuration
        call: avatax-brazil-companies.createcompany
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: avatax-brazil-companies-mcp
    port: 9090
    transport: http
    description: MCP adapter for Avalara AvaTax Brazil API — Companies. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: avalara-list-companies-configured-brazil
      description: Avalara List Companies Configured for Brazil
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: avatax-brazil-companies.listcompanies
      outputParameters:
      - type: object
        mapping: $.
    - name: avalara-create-company-configuration
      description: Avalara Create a Company Configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: avatax-brazil-companies.createcompany
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
